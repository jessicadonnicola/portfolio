<main class="contact-page pb-5 mb-5 framer-hidden">
  <div class="container custom-container" style="max-width: 768px;">
    
    <div class="section-header text-center mb-5 pt-5 mt-5">
      <p class="overline-text">Contact</p>
      <h1 class="section-title text-white mb-3" style="font-size: clamp(3rem, 5vw, 4rem);">Let's Talk</h1>
      <p class="mx-auto" style="max-width: 500px;">
       Hai un progetto in mente o vuoi metterti in contatto? Compila il form qui sotto e ti risponderò al più presto. 
      </p>
    </div>

    <div class="contact-form-wrapper glass p-4 p-md-5" style="border-radius: 1.5rem;">
      <form id="contact-form">
        
        <div class="row g-4">
          <div class="col-md-6">
            <label for="first_name" class="form-label small text-uppercase fw-bold tracking-wider">Nome *</label>
            <input type="text" class="form-control custom-input" id="first_name" name="first_name" required placeholder="John">
          </div>
          
          <div class="col-md-6">
            <label for="last_name" class="form-label small text-uppercase fw-bold tracking-wider">Cognome *</label>
            <input type="text" class="form-control custom-input" id="last_name" name="last_name" required placeholder="Doe">
          </div>
          
          <div class="col-12">
            <label for="company_name" class="form-label small text-uppercase fw-bold tracking-wider">
              Azienda <span style="opacity: 0.5;">(facoltativo)</span>
            </label>
            <input type="text" class="form-control custom-input" id="company_name" name="company_name" placeholder="Acme Inc.">
          </div>
          
          <div class="col-12">
            <label for="user_email" class="form-label small text-uppercase fw-bold tracking-wider">Email *</label>
            <input type="email" class="form-control custom-input" id="user_email" name="user_email" required placeholder="john@example.com">
          </div>
          
          <div class="col-12">
            <label class="form-label small text-uppercase fw-bold tracking-wider mb-3">Motivo del contatto *</label>
            <div class="reason-tags-container d-flex flex-wrap gap-2">
              
              <input type="radio" class="btn-check" name="subject" id="reason_job" value="Job Opportunity / Interview" required>
              <label class="reason-tag" for="reason_job">Opportunità di lavoro / Colloquio</label>

              <input type="radio" class="btn-check" name="subject" id="reason_project" value="Project Collaboration">
              <label class="reason-tag" for="reason_project">Collaborazione su un progetto</label>

              <input type="radio" class="btn-check" name="subject" id="reason_portfolio" value="Portfolio Inquiry">
              <label class="reason-tag" for="reason_portfolio">Richiesta sul portfolio</label>

              <input type="radio" class="btn-check" name="subject" id="reason_networking" value="Professional Networking">
              <label class="reason-tag" for="reason_networking">Networking professionale</label>

              <input type="radio" class="btn-check" name="subject" id="reason_other" value="Other">
              <label class="reason-tag" for="reason_other">Altro</label>
              
            </div>
          </div>
          
          <div class="col-12">
            <label for="message" class="form-label small text-uppercase fw-bold tracking-wider">Messaggio *</label>
            <textarea class="form-control custom-input resize-none" id="message" name="message" rows="5" required placeholder="Parlami del tuo progetto o idea…"></textarea>
          </div>
          
          <div class="col-12 mt-4">
            <button type="submit" id="submit-button" class="btn btn-gradient w-100 py-3 rounded-pill fw-bold" style="font-size: 1.1rem;">
              Invia Messaggio
            </button>
          </div>
        </div>

        <div id="form-message" class="mt-4 text-center p-3 rounded" style="display: none;"></div>
      </form>
    </div>

        Back to home

    </div>
